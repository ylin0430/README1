<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷 - 柯靜宜</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --bg:#f8f9ff;
    --card:#ffffff;
    --border:#e6e9f5;
    --text:#2d3748;
    --sub:#718096;
    --accent:#7c3aed;
    --accent-light:#ede6ff;
    --gradient:linear-gradient(135deg,#7c3aed,#8b5cf6);
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Noto Sans TC',sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
}

/* header */
header{
    text-align:center;
    padding:60px 20px 40px;
    background:var(--card);
    border-bottom:1px solid var(--border);
}

.profile-img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #fff;
    box-shadow:0 6px 20px rgba(124,58,237,0.15);
    cursor:pointer;
    transition:all 0.3s ease;
}
.profile-img:hover{
    transform:scale(1.07);
    box-shadow:0 8px 25px rgba(124,58,237,0.2);
}

h1{
    margin:12px 0 6px;
    font-size:2rem;
    color:#1a202c;
}
.subtitle{
    color:var(--sub);
    font-size:1rem;
}
.career{
    display:inline-block;
    margin-top:8px;
    padding:6px 14px;
    background:var(--accent-light);
    color:var(--accent);
    font-size:0.9rem;
    border-radius:20px;
    font-weight:500;
}

/* layout */
.layout{
    display:grid;
    grid-template-columns: 320px 1fr;
    gap:30px;
    max-width:1100px;
    margin:40px auto;
    padding:0 20px;
}

/* card */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:26px;
    box-shadow:0 8px 20px rgba(0,0,0,0.04);
    transition:0.25s ease;
    margin-bottom:25px;
}
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 28px rgba(0,0,0,0.06);
}

.title{
    background:var(--gradient);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:20px;
    font-size:1.3rem;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
}
.title::before{
    content:'';
    width:4px;
    height:18px;
    background:var(--accent);
    border-radius:2px;
}

.sidebar .info-item{
    margin-bottom:12px;
    font-size:0.95rem;
    display:flex;
    align-items:center;
}

.sidebar i{
    color:var(--accent);
    margin-right:10px;
    font-size:1rem;
    width:16px;
    text-align:center;
}

/* skills */
.skill{
    margin-bottom:16px;
}
.skill-name{
    display:flex;
    justify-content:space-between;
    font-size:0.9rem;
    margin-bottom:6px;
    color:var(--text);
}
.skill-bar{
    height:7px;
    background:#f1f5f9;
    border-radius:20px;
    overflow:hidden;
}
.skill-level{
    height:100%;
    background:var(--gradient);
    width:0;
    border-radius:20px;
    transition:1s cubic-bezier(0.16,1,0.3,1);
}

/* timeline */
.timeline-item{
    margin-bottom:24px;
    padding-left:20px;
    border-left:3px solid var(--accent-light);
    position:relative;
}
.timeline-item::before{
    content:'';
    position:absolute;
    left:-9px;
    top:0;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--accent);
}
.timeline-item strong{
    font-size:1rem;
    color:#2d3748;
}
p{
    color:var(--sub);
    margin:6px 0;
    font-size:0.95rem;
}

/* 圖片放大 */
.image-modal{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}
.image-modal img{
    max-width:85%;
    max-height:85%;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* 響應式 */
@media(max-width:768px){
    .layout{
        grid-template-columns:1fr;
        margin:20px auto;
    }
    header{
        padding:40px 20px;
    }
    h1{
        font-size:1.7rem;
    }
}
</style>
</head>

<body>

<audio autoplay loop controls style="position:fixed; bottom:10px; right:10px; z-index:999;">
    <source src="mymusic.mp3" type="audio/mpeg">


<header>
    <img src="IMG_3882.jpeg" class="profile-img" onclick="openImage(this.src)">
    <h1>柯靜宜</h1>
    <div class="subtitle">亞洲大學 | 學號：114024010</div>
    <div class="career">求職意向：輕鬆、有創作力的崗位</div>
</header>

<div class="layout">

<div class="sidebar">

<div class="card">
<div class="title">個人資訊</div>
<div class="info-item"><i class="fas fa-id-card"></i>柯靜宜</div>
<div class="info-item"><i class="fas fa-user-graduate"></i>亞洲大學</div>
<div class="info-item"><i class="fas fa-id-badge"></i>114024010</div>
<div class="info-item"><i class="fas fa-graduation-cap"></i>大學在學中</div>
<div class="info-item"><i class="fas fa-envelope"></i>example@email.com</div>
</div>

<div class="card">
<div class="title">專業技能</div>

<div class="skill">
    <div class="skill-name">企劃撰寫 <span>35%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="35"></div></div>
</div>

<div class="skill">
    <div class="skill-name">攝影 <span>35%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="35"></div></div>
</div>

<div class="skill">
    <div class="skill-name">Python <span>3%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="3"></div></div>
</div>

<div class="skill">
    <div class="skill-name">英文能力 <span>10%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="10"></div></div>
</div>

<div class="skill">
    <div class="skill-name">Adobe應用 <span>25%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="25"></div></div>
</div>

<div class="skill">
    <div class="skill-name">問題解決 <span>100%</span></div>
    <div class="skill-bar"><div class="skill-level" data-level="100"></div></div>
</div>

</div>

</div>

<div class="main">

<div class="card">
<div class="title">自我介紹</div>
<p>
您好，我是亞洲大學資訊傳播學系的柯靜宜。<br><br>
我對創作與影像製作充滿熱情，並具備良好的學習能力與團隊合作精神。<br><br>
希望未來能在創意產業發展。
</p>
</div>

<div class="card">
<div class="title">教育背景</div>

<div class="timeline-item">
<strong>2025 - 至今</strong>
<p>亞洲大學 - 資訊傳播學系</p>
<p>學士學位</p>
</div>

<div class="timeline-item">
<strong>2022 - 2025</strong>
<p>台中某區私立高中</p>
</div>

</div>

<div class="card">
<div class="title">實習 / 專案經歷</div>

<div class="timeline-item">
<strong>2022 - 2025</strong>
<p>高中校園活動攝影/企劃/招生/比賽/幕後人員</p>
<p>高中科系粉絲專頁運營/影像剪輯/內容創作</p>
</div>

<div class="timeline-item">
<strong>2022 - 2024</strong>
<p>參加小比賽獲得獎金結果全花在車費上</p>
</div>

</div>

</div>

</div>

<div class="image-modal" id="imgModal" onclick="closeImage()">
    <img id="modalImg">
</div>

<script>
document.querySelectorAll(".skill-level").forEach(el=>{
    setTimeout(()=>{
        el.style.width = el.dataset.level + "%";
    },300);
});

function openImage(src){
    document.getElementById("imgModal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

function closeImage(){
    document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
